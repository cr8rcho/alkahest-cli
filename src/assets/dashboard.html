<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alkahest — Product Map</title>
    <style>
      /* 미니멀 팔레트 — 라이트 기본, [data-theme="dark"] 로 스왑 (스타일 F) */
      :root {
        --bg: #ffffff;
        --panel: #f7f7f8;
        --panel-soft: #ffffff;
        --line: #e4e4e7;
        --ink: #18181b;
        --muted: #71717a;
        --node-fill: #ffffff;       /* 화면 */
        --node-stroke: #c4c4cc;
        --node-ink: #27272a;
        --res-fill: #f4f4f5;        /* 리소스 (F: 옅은 회색 채움) */
        --entry: #16a34a;
        --accent: #2563eb;
        --edge: #a1a1aa;
      }
      html[data-theme="dark"] {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-soft: #1c2128;
        --line: #2a2f37;
        --ink: #e6edf3;
        --muted: #8b949e;
        --node-fill: #1c2128;
        --node-stroke: #444c56;
        --node-ink: #e6edf3;
        --res-fill: #30404f;
        --entry: #3fb950;
        --accent: #58a6ff;
        --edge: #484f58;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 13px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .toolbar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        column-gap: 16px;
        row-gap: 6px;
        padding: 8px 14px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        flex: 0 0 auto;
      }
      .theme-toggle { cursor: pointer; border: 1px solid var(--line); background: var(--bg); color: var(--ink); border-radius: 7px; padding: 4px 9px; font-size: 12px; }
      .brand { font-weight: 700; letter-spacing: 0.3px; white-space: nowrap; }
      .brand .sub { color: var(--muted); font-weight: 400; margin-left: 6px; }
      .counts { color: var(--muted); white-space: nowrap; }
      .toolbar label { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; white-space: nowrap; }
      .legend { margin-left: auto; display: flex; flex-wrap: wrap; gap: 6px 14px; color: var(--muted); align-items: center; }
      .legend span { white-space: nowrap; }
      .legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: -1px; }
      .legend .edge { display: inline-block; width: 22px; border-top: 2px solid; margin-right: 5px; vertical-align: 3px; }
      main { flex: 1 1 auto; display: flex; min-height: 0; position: relative; }
      #graph { flex: 1 1 auto; min-width: 0; cursor: grab; touch-action: none; }
      #graph:active { cursor: grabbing; }
      .panel-close { display: none; }
      #panel {
        flex: 0 0 360px;
        border-left: 1px solid var(--line);
        background: var(--panel);
        padding: 16px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      #panel h2 { margin: 0 0 2px; font-size: 16px; }
      #panel .route { color: var(--accent); font-family: ui-monospace, monospace; font-size: 12px; margin-bottom: 12px; word-break: break-all; }
      #panel .src { color: var(--muted); font-family: ui-monospace, monospace; font-size: 11px; margin-bottom: 14px; word-break: break-all; }
      #panel section { margin-bottom: 16px; }
      #panel h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin: 0 0 7px; }
      #panel ul { list-style: none; margin: 0; padding: 0; }
      #panel li { padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px; margin-bottom: 5px; background: var(--panel-soft); }
      #panel li.clickable { cursor: pointer; }
      #panel li.clickable:hover { border-color: var(--accent); }
      #panel .tag { font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted); }
      #panel .lineno { float: right; color: var(--muted); font-family: ui-monospace, monospace; font-size: 10px; }
      #panel .empty { color: var(--muted); font-style: italic; }
      .hint { color: var(--muted); }
      .node text { font-size: 11px; fill: var(--node-ink); pointer-events: none; paint-order: stroke; stroke: var(--bg); stroke-width: 3px; }
      .node circle, .node rect { cursor: pointer; stroke: var(--node-stroke); stroke-width: 1.5px; }
      .node.selected circle, .node.selected rect { stroke: var(--accent); stroke-width: 2.5px; }
      .node.dim { opacity: 0.2; }
      .edge { opacity: 0.9; }
      .edge.dim { opacity: 0.08; }

      /* ---- 모바일: 좁은 화면에서는 패널을 하단 시트로 ---- */
      @media (max-width: 640px) {
        body { height: 100dvh; }
        .toolbar { column-gap: 12px; padding: 8px 12px; font-size: 12px; }
        .brand .sub { display: none; }
        .legend { width: 100%; margin-left: 0; justify-content: flex-start; font-size: 11px; }
        #panel {
          position: absolute;
          left: 0; right: 0; bottom: 0;
          flex: none;
          width: 100%;
          max-height: 62%;
          border-left: none;
          border-top: 1px solid var(--line);
          border-radius: 14px 14px 0 0;
          box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.45);
          transform: translateY(101%);
          transition: transform 0.22s ease;
          padding-top: 30px;
        }
        body.panel-open #panel { transform: translateY(0); }
        .panel-close {
          display: block;
          position: absolute;
          top: 6px; right: 10px;
          width: 32px; height: 32px;
          line-height: 30px; text-align: center;
          font-size: 20px; color: var(--muted);
          background: none; border: none; cursor: pointer;
        }
        /* 시트 손잡이 */
        #panel::before {
          content: ""; position: absolute; top: 9px; left: 50%;
          width: 38px; height: 4px; margin-left: -19px;
          background: var(--line); border-radius: 2px;
        }
      }
    </style>
  </head>
  <body>
    <header class="toolbar">
      <div class="brand">Alkahest<span class="sub">Product Map</span></div>
      <div class="counts" id="counts"></div>
      <label><input type="checkbox" id="t-trans" checked /> 이동</label>
      <label><input type="checkbox" id="t-calls" checked /> 호출</label>
      <div class="legend">
        <span><span class="swatch" style="background: var(--node-fill); border: 1.5px solid var(--node-stroke)"></span>화면</span>
        <span><span class="swatch" style="background: var(--res-fill); border: 1.5px solid var(--node-stroke); border-radius: 2px"></span>리소스</span>
        <span><span class="edge" style="border-color: var(--edge)"></span>이동</span>
        <span><span class="edge" style="border-top-style: dotted; border-color: var(--edge)"></span>포함</span>
        <span><span class="edge" style="border-top-style: dashed; border-color: var(--edge)"></span>호출</span>
      </div>
      <button class="theme-toggle" id="fit-btn" aria-label="화면 맞춤">⤢ 맞춤</button>
      <button class="theme-toggle" id="theme-toggle" aria-label="테마 전환">🌗</button>
    </header>
    <main>
      <svg id="graph">
        <defs>
          <!-- 단일 화살표(이동·호출 공용). userSpaceOnUse: 선 두께와 무관하게 크기 고정 -->
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="var(--edge)" />
          </marker>
        </defs>
        <g id="viewport">
          <g id="edges"></g>
          <g id="nodes"></g>
        </g>
      </svg>
      <aside id="panel">
        <button class="panel-close" id="panel-close" aria-label="닫기">×</button>
        <div id="panel-body">
          <p class="hint">노드를 클릭하면 화면의 기능·이동·호출을 봅니다.<br /><br />드래그로 노드 이동, 휠/핀치로 확대/축소, 빈 곳 드래그로 이동.</p>
        </div>
      </aside>
    </main>

    <script id="alkahest-data" type="application/json">/*__ALKAHEST_MAP__*/</script>
    <script>
      const MAP = JSON.parse(document.getElementById("alkahest-data").textContent);
      const SVGNS = "http://www.w3.org/2000/svg";

      // ---- 인덱스 ----
      const screensById = new Map(MAP.screens.map((s) => [s.id, s]));
      const resourcesById = new Map(MAP.resources.map((r) => [r.id, r]));

      // ---- 노드/엣지 그래프 모델 ----
      const nodes = [];
      const nodeByKey = new Map();
      function addNode(n) { nodes.push(n); nodeByKey.set(n.key, n); return n; }
      for (const s of MAP.screens) addNode({ key: "s:" + s.id, type: "screen", id: s.id, label: s.title || s.route, r: 10 });
      for (const r of MAP.resources) addNode({ key: "r:" + r.id, type: "resource", id: r.id, label: r.label, kind: r.kind, r: 8 });

      const edges = [];
      for (const t of MAP.transitions) {
        if (t.to == null) continue;
        const target = nodeByKey.get("s:" + t.to);
        if (!target) continue; // 외부 URL/미해결은 그래프에 안 그림 (패널에 표시)
        // rel: "contains"(구조적 포함) vs "navigate"(사용자 이동). 둘 다 "transition" 레이어.
        edges.push({ source: nodeByKey.get("s:" + t.from), target, kind: "transition", rel: t.kind || "navigate" });
      }
      for (const c of MAP.calls) {
        if (c.to == null) continue;
        const target = nodeByKey.get("r:" + c.to);
        if (!target) continue;
        edges.push({ source: nodeByKey.get("s:" + c.from), target, kind: "call", rel: "call" });
      }

      {
        const navCount = MAP.transitions.filter((t) => (t.kind || "navigate") === "navigate").length;
        const containCount = MAP.transitions.length - navCount;
        document.getElementById("counts").textContent =
          MAP.screens.length + " 화면 · " + MAP.resources.length + " 리소스 · " +
          navCount + " 이동" + (containCount ? " · " + containCount + " 포함" : "") +
          " · " + MAP.calls.length + " 호출";
      }

      // ---- 초기 배치: 진입점에서 BFS depth → 좌→우 계층 ----
      const svg = document.getElementById("graph");
      let W = (svg.clientWidth || 800), H = (svg.clientHeight || 600);

      // 화면 노드의 나가는 이웃 (이동+포함). 리소스는 호출의 끝단.
      const outAdj = new Map(nodes.map((n) => [n.key, []]));
      for (const e of edges) outAdj.get(e.source.key).push(e.target.key);

      // 진입점: isEntry 표시된 화면 우선, 없으면 들어오는 엣지 없는 화면.
      const hasIncoming = new Set(edges.map((e) => e.target.key));
      const entryScreens = MAP.screens.filter((s) => s.isEntry).map((s) => "s:" + s.id);
      let roots = entryScreens.length
        ? entryScreens
        : nodes.filter((n) => n.type === "screen" && !hasIncoming.has(n.key)).map((n) => n.key);
      if (!roots.length && nodes.length) roots = [nodes[0].key]; // 순환뿐이면 아무거나

      // BFS depth 부여
      const depth = new Map();
      const queue = [];
      for (const r of roots) { depth.set(r, 0); queue.push(r); }
      while (queue.length) {
        const k = queue.shift();
        for (const nx of outAdj.get(k) || []) {
          if (!depth.has(nx)) { depth.set(nx, depth.get(k) + 1); queue.push(nx); }
        }
      }
      let maxDepth = 0;
      for (const d of depth.values()) maxDepth = Math.max(maxDepth, d);
      // 미연결 노드는 맨 오른쪽 열에.
      for (const n of nodes) if (!depth.has(n.key)) depth.set(n.key, maxDepth + 1);
      maxDepth += 1;

      // 열(depth)별 그룹화
      const byDepth = new Map();
      for (const n of nodes) {
        const d = depth.get(n.key);
        if (!byDepth.has(d)) byDepth.set(d, []);
        byDepth.get(d).push(n);
      }

      // 격자 배치: 붐비는 열은 여러 서브열로 wrap → 세로 폭발 방지.
      // 각 노드의 목표 x는 (depth 밴드 시작 + 서브열) 로 정해 좌→우 흐름 유지.
      const ROW_GAP = 64, SUB_GAP = 150, BAND_GAP = 230;
      const maxRows = Math.max(6, Math.floor((H - 80) / ROW_GAP)); // 한 서브열 최대 노드 수
      let bandX = 80;
      for (let d = 0; d <= maxDepth; d++) {
        const col = byDepth.get(d);
        if (!col || !col.length) continue;
        const subCols = Math.ceil(col.length / maxRows);
        const rows = Math.ceil(col.length / subCols);
        col.forEach((n, i) => {
          const sc = Math.floor(i / rows), row = i % rows;
          n.depth = d;
          n.colX = bandX + sc * SUB_GAP;      // 목표 x (서브열 포함)
          n.x = n.colX;
          n.y = 60 + row * ROW_GAP;
          n.vx = 0; n.vy = 0;
        });
        bandX += (subCols - 1) * SUB_GAP + BAND_GAP;
      }

      // ---- 상호작용 상태 (force step 이 참조하므로 루프보다 먼저 선언) ----
      let dragging = null, panStart = null, selected = null;

      // ---- 가벼운 정착: y만 약하게 펴서 겹침 해소 (x는 colX 고정). 격자 흐트러뜨리지 않음. ----
      let alpha = 1;
      const Y_REPULSION = 900, Y_SPRING = 0.03, DAMP = 0.82;
      function step() {
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];
            if (Math.abs(a.colX - b.colX) > 1) continue; // 같은 서브열만
            let dy = a.y - b.y;
            const sign = dy >= 0 ? 1 : -1;
            const dist = Math.abs(dy) || 1;
            if (dist > ROW_GAP * 1.5) continue;          // 충분히 떨어지면 그만
            const f = Y_REPULSION / dist;
            a.vy += sign * f; b.vy -= sign * f;
          }
        }
        for (const e of edges) {
          const a = e.source, b = e.target;
          const f = (b.y - a.y) * Y_SPRING;
          a.vy += f; b.vy -= f;
        }
        for (const n of nodes) {
          n.x = n.colX;                       // x 고정 (드래그 중에도 열 유지)
          if (n === dragging) continue;
          n.vy *= DAMP;
          n.y += n.vy * alpha;
        }
        alpha *= 0.99;
      }

      // ---- 렌더 ----
      const gEdges = document.getElementById("edges");
      const gNodes = document.getElementById("nodes");
      const edgeEls = edges.map((e) => {
        const ln = document.createElementNS(SVGNS, "line");
        ln.setAttribute("class", "edge " + e.kind);
        ln.setAttribute("stroke", "var(--edge)");
        ln.setAttribute("stroke-width", "1.4");
        if (e.kind === "call") {
          // 호출: 긴 점선 + 화살표
          ln.setAttribute("stroke-dasharray", "4 4");
          ln.setAttribute("marker-end", "url(#arrow)");
        } else if (e.rel === "contains") {
          // 포함: 짧은 점선, 화살표 없음
          ln.setAttribute("stroke-dasharray", "2 3");
        } else {
          // 이동: 실선 + 화살표
          ln.setAttribute("marker-end", "url(#arrow)");
        }
        gEdges.appendChild(ln);
        e.el = ln;
        return ln;
      });
      const nodeEls = nodes.map((n) => {
        const g = document.createElementNS(SVGNS, "g");
        g.setAttribute("class", "node");
        // 스타일 F: 화면=흰 원 / 리소스=옅은 회색 사각. 시작점은 위치(맨 왼쪽)로만 구분.
        let shape;
        if (n.type === "screen") {
          shape = document.createElementNS(SVGNS, "circle");
          shape.setAttribute("r", n.r);
          shape.setAttribute("fill", "var(--node-fill)");
        } else {
          shape = document.createElementNS(SVGNS, "rect");
          shape.setAttribute("width", n.r * 2); shape.setAttribute("height", n.r * 2);
          shape.setAttribute("x", -n.r); shape.setAttribute("y", -n.r);
          shape.setAttribute("rx", 3);
          shape.setAttribute("fill", "var(--res-fill)");
        }
        const txt = document.createElementNS(SVGNS, "text");
        txt.setAttribute("x", n.r + 4); txt.setAttribute("y", 4);
        txt.textContent = n.label.length > 26 ? n.label.slice(0, 25) + "…" : n.label;
        g.appendChild(shape); g.appendChild(txt);
        g.addEventListener("pointerdown", (ev) => onNodeDown(ev, n));
        gNodes.appendChild(g);
        n.el = g;
        return g;
      });

      function paint() {
        for (const e of edges) {
          // 선을 노드 가장자리에서 끊어 화살표가 노드에 안 가리게 트림
          const a = e.source, b = e.target;
          const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
          const ux = dx / len, uy = dy / len;
          const padA = (a.r || 10) + 2, padB = (b.r || 10) + 2;
          e.el.setAttribute("x1", a.x + ux * padA); e.el.setAttribute("y1", a.y + uy * padA);
          e.el.setAttribute("x2", b.x - ux * padB); e.el.setAttribute("y2", b.y - uy * padB);
        }
        for (const n of nodes) n.el.setAttribute("transform", "translate(" + n.x + "," + n.y + ")");
      }
      let fitted = false;
      function loop() {
        if (alpha > 0.004) { step(); paint(); }
        else if (!fitted) { fitted = true; fitToView(); } // 정착되면 한 번 전체 맞춤
        requestAnimationFrame(loop);
      }
      loop();

      // ---- 레이어 토글 ----
      const tTrans = document.getElementById("t-trans"), tCalls = document.getElementById("t-calls");
      function applyLayers() {
        for (const e of edges) e.el.style.display =
          (e.kind === "transition" && !tTrans.checked) || (e.kind === "call" && !tCalls.checked) ? "none" : "";
        for (const n of nodes) if (n.type === "resource") n.el.style.display = tCalls.checked ? "" : "none";
      }
      tTrans.onchange = tCalls.onchange = applyLayers;

      // ---- 선택/하이라이트 ---- (selected 는 위에서 선언됨)
      function select(n) {
        selected = n;
        const connected = new Set([n.key]);
        for (const e of edges) {
          if (e.source === n) connected.add(e.target.key);
          if (e.target === n) connected.add(e.source.key);
        }
        for (const m of nodes) {
          m.el.classList.toggle("dim", !connected.has(m.key));
          m.el.classList.toggle("selected", m === n); // 선택 노드 액센트 링
        }
        for (const e of edges) e.el.classList.toggle("dim", e.source !== n && e.target !== n);
        document.body.classList.add("panel-open");
        renderPanel(n);
      }
      function clearSelection() {
        selected = null;
        for (const m of nodes) { m.el.classList.remove("dim"); m.el.classList.remove("selected"); }
        for (const e of edges) e.el.classList.remove("dim");
        panel.innerHTML = '<p class="hint">노드를 클릭하면 화면의 기능·이동·호출을 봅니다.</p>';
        document.body.classList.remove("panel-open");
      }
      // svg 빈 곳 탭 → clearSelection 은 pointerup(탭) 핸들러에서 처리.
      document.getElementById("panel-close").addEventListener("click", clearSelection);

      // ---- 테마 토글 (라이트 기본 ↔ 다크) ----
      document.getElementById("theme-toggle").addEventListener("click", () => {
        const h = document.documentElement;
        h.setAttribute("data-theme", h.getAttribute("data-theme") === "dark" ? "light" : "dark");
      });
      // ---- 화면 맞춤 버튼 ----
      document.getElementById("fit-btn").addEventListener("click", fitToView);

      // ---- 패널 ----
      const panel = document.getElementById("panel-body"); // 내용 컨테이너(닫기버튼/핸들은 보존)
      const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      function li(inner, cls) { return "<li" + (cls ? ' class="' + cls + '"' : "") + ">" + inner + "</li>"; }
      function listOr(items, emptyMsg) { return items.length ? "<ul>" + items.join("") + "</ul>" : '<p class="empty">' + emptyMsg + "</p>"; }

      function renderPanel(n) {
        if (n.type === "screen") return renderScreen(screensById.get(n.id));
        return renderResource(resourcesById.get(n.id));
      }

      function renderScreen(s) {
        const out = MAP.transitions.filter((t) => t.from === s.id);
        const inc = MAP.transitions.filter((t) => t.to === s.id);
        const calls = MAP.calls.filter((c) => c.from === s.id);
        const feats = s.features.map((f) =>
          li('<span class="tag">[' + f.kind + "]</span> " + esc(f.label) + (f.loc ? '<span class="lineno">L' + f.loc.line + "</span>" : "")));
        const navItem = (t) => {
          const label = t.to ? (screensById.has(t.to) ? esc(screensById.get(t.to).title || t.to) : esc(t.to)) : esc(t.rawTarget || "미해결");
          const cls = t.to && screensById.has(t.to) ? "clickable" : "";
          const key = t.to && screensById.has(t.to) ? ' data-sel="s:' + esc(t.to) + '"' : "";
          return "<li" + (cls ? ' class="' + cls + '"' : "") + key + '><span class="tag">' + esc(t.trigger) + "</span> → " + label +
            '<span class="lineno">L' + t.loc.line + "</span></li>";
        };
        const callItem = (c) => {
          const label = c.to ? esc(c.to) : esc(c.rawTarget || "미해결");
          const cls = c.to ? "clickable" : "";
          const key = c.to ? ' data-sel="r:' + esc(c.to) + '"' : "";
          return "<li" + (cls ? ' class="' + cls + '"' : "") + key + '><span class="tag">' + esc(c.trigger) + "</span> " + label +
            '<span class="lineno">L' + c.loc.line + "</span></li>";
        };
        panel.innerHTML =
          "<h2>" + esc(s.title) + "</h2>" +
          '<div class="route">' + esc(s.route) + "</div>" +
          '<div class="src">' + esc(s.sourceFile) + "</div>" +
          (s.summary ? "<section><h3>요약</h3><p>" + esc(s.summary) + "</p></section>" : "") +
          "<section><h3>기능 (" + s.features.length + ")</h3>" + listOr(feats, "추출된 UI 기능 없음") + "</section>" +
          "<section><h3>나가는 이동 (" + out.length + ")</h3>" + listOr(out.map(navItem), "없음") + "</section>" +
          "<section><h3>부르는 리소스 (" + calls.length + ")</h3>" + listOr(calls.map(callItem), "없음") + "</section>" +
          "<section><h3>들어오는 이동 (" + inc.length + ")</h3>" + listOr(inc.map(navItem), "없음") + "</section>";
        wirePanelLinks();
      }

      function renderResource(r) {
        const callers = MAP.calls.filter((c) => c.to === r.id);
        const items = callers.map((c) => {
          const s = screensById.get(c.from);
          return '<li class="clickable" data-sel="s:' + esc(c.from) + '"><span class="tag">' + esc(c.trigger) + "</span> " +
            esc(s ? s.title : c.from) + '<span class="lineno">L' + c.loc.line + "</span></li>";
        });
        panel.innerHTML =
          "<h2>" + esc(r.label) + "</h2>" +
          '<div class="route">' + esc(r.kind) + (r.method ? " · " + esc(r.method) : "") + "</div>" +
          '<div class="src">' + esc(r.path || "") + "</div>" +
          "<section><h3>함께 부르는 화면 (" + callers.length + ")</h3>" + listOr(items, "없음") + "</section>";
        wirePanelLinks();
      }

      function wirePanelLinks() {
        panel.querySelectorAll("[data-sel]").forEach((el) => {
          el.addEventListener("click", () => { const n = nodeByKey.get(el.getAttribute("data-sel")); if (n) select(n); });
        });
      }

      // ---- pan / zoom / drag ----
      const viewport = document.getElementById("viewport");
      let tx = 0, ty = 0, k = 1;
      function applyTransform() { viewport.setAttribute("transform", "translate(" + tx + " " + ty + ") scale(" + k + ")"); }
      function toWorld(cx, cy) { const rect = svg.getBoundingClientRect(); return { x: (cx - rect.left - tx) / k, y: (cy - rect.top - ty) / k }; }

      // 전체 그래프가 화면에 들어오게 맞춤 (여백 40px, 최대 1.3배)
      function fitToView() {
        if (!nodes.length) return;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const n of nodes) {
          const r = (n.r || 10) + 60; // 라벨 여유
          minX = Math.min(minX, n.x - r); maxX = Math.max(maxX, n.x + r);
          minY = Math.min(minY, n.y - r); maxY = Math.max(maxY, n.y + r);
        }
        const w = svg.clientWidth || 800, h = svg.clientHeight || 600, pad = 40;
        const gw = maxX - minX || 1, gh = maxY - minY || 1;
        k = Math.min((w - pad * 2) / gw, (h - pad * 2) / gh, 1.3);
        tx = pad + (w - pad * 2 - gw * k) / 2 - minX * k;
        ty = pad + (h - pad * 2 - gh * k) / 2 - minY * k;
        applyTransform();
      }

      // dragging, panStart 는 위에서 선언됨.
      // 탭 vs 드래그 구분: pointerdown 시점만 기록하고, 임계값(4px) 넘게 움직이면 드래그로 승격.
      const DRAG_THRESHOLD = 4;
      let down = null; // {node|null, x, y, moved, pointerId}

      function onNodeDown(ev, n) {
        ev.stopPropagation();
        down = { node: n, x: ev.clientX, y: ev.clientY, moved: false, pointerId: ev.pointerId };
        svg.setPointerCapture(ev.pointerId);
      }
      svg.addEventListener("pointerdown", (ev) => {
        if (down) return; // 노드에서 이미 시작됨
        down = { node: null, x: ev.clientX, y: ev.clientY, moved: false, pointerId: ev.pointerId };
        panStart = { x: ev.clientX - tx, y: ev.clientY - ty };
        svg.setPointerCapture(ev.pointerId);
      });
      svg.addEventListener("pointermove", (ev) => {
        if (!down) return;
        if (!down.moved && Math.hypot(ev.clientX - down.x, ev.clientY - down.y) > DRAG_THRESHOLD) {
          down.moved = true;
          if (down.node) { dragging = down.node; alpha = Math.max(alpha, 0.5); } // 드래그 승격
        }
        if (!down.moved) return;
        if (dragging) { const w = toWorld(ev.clientX, ev.clientY); dragging.y = w.y; dragging.vy = 0; paint(); } // 세로만(열 고정)
        else if (panStart) { tx = ev.clientX - panStart.x; ty = ev.clientY - panStart.y; applyTransform(); }
      });
      svg.addEventListener("pointerup", () => {
        if (down && !down.moved) {       // 안 움직였으면 = 탭
          if (down.node) select(down.node);
          else clearSelection();
        }
        dragging = null; panStart = null; down = null;
      });
      svg.addEventListener("wheel", (ev) => {
        ev.preventDefault();
        const rect = svg.getBoundingClientRect();
        const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
        const factor = ev.deltaY < 0 ? 1.1 : 1 / 1.1;
        const nk = Math.min(4, Math.max(0.2, k * factor));
        tx = mx - (mx - tx) * (nk / k); ty = my - (my - ty) * (nk / k); k = nk;
        applyTransform();
      }, { passive: false });

      window.addEventListener("resize", () => { W = (svg.clientWidth || 800); H = (svg.clientHeight || 600); alpha = Math.max(alpha, 0.3); });
      applyLayers();
    </script>
  </body>
</html>
